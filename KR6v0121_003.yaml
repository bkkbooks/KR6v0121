body:
  text: 敦煌本壇經校釋疏義第五章執筆者李鐵華研讀班集體討論經文一正文時大師堂前有三間房廊於此廊下供養欲畫楞伽變並畫五祖大師傳授衣法流行後代為記畫人盧坽看壁了明日下手上座神秀思惟諸人不呈心偈緣我為教授師我若不呈心偈五祖如何得見我心中見解深淺我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位若不呈心終不得法良久思惟甚難甚難夜至三更不令人見遂向南廊下中間壁上題作呈心偈欲求於法若五祖見偈言此偈語若訪覓我我見和尚即云是秀作五祖見偈言不堪自是我迷宿業障重不合得法聖意難測我心自息二校記並諸家録校復議時大師堂前有三間房廊於此廊下供養欲畫楞伽變並畫五祖大師傳授衣法流行後代為記時敦博本無據斯本補孟本李申本潘本鄧遼本黃本據斯本校作時周本李富華本楊本中島本依敦博本録文無時字復議此處有無時字無礙理解但以有時字於意為長孟本李申本潘本鄧遼本黃本為正周本李富華本楊本中島本失校不妥楞伽變斯本敦博本同孟本周本李申本潘本鄧遼本中島本黃本均作楞伽變李富華本徑作楞伽變相楊本據鈴木本補作楞伽變相復議此處變即變相之意且為古代經常使用的名詞不需補孟本周本李申本潘本鄧遼本中島本黃本為正楊本據非敦煌本補不妥李富華本徑補尤為不妥衣敦博本作於據斯本改孟本周本李申本楊本潘本鄧遼本中島本黃本據斯本校作衣李富華本徑改作衣復議孟本周本李申本楊本潘本鄧遼本中島本黃本為正李富華本徑改不妥畫人盧坽看壁了明日下手盧敦博本作唐據斯本改孟本李申本楊本潘本鄧遼本黃本據斯本校作盧周本中島本理校作盧李富華本徑改作盧復議斯本敦博本下文均有五祖平旦喚盧供奉云云故此處畫師姓盧應據斯本校改孟本李申本楊本潘本鄧遼本黃本為正周本中島本不據斯本而理校不妥李富華本徑改尤為不妥坽斯本作玪敦博本作坽孟本據興聖寺本改作珍周本李富華本楊本徑改作珍鄧遼本認為敦博本作坽斯本作玪未知孰是俟考李申本據敦博本録作坽並指出斯本作玪潘本理校作玲中島本理校作珍黃本據惠昕等三本校改作珍復議查漢語大字典坽集韻青韻坽峻岸玪次於玉的美石據此知二者均可作為人名因此未知斯本敦博本孰是此暫據敦博本録俟議李申本鄧遼本為正孟本黃本據非敦煌本改不妥周本李富華本楊本徑改尤為不妥潘本中島本理校不妥壁敦博本作糪據斯本改孟本李申本李富華本楊本潘本中島本徑録作壁周本鄧遼本據斯本校作壁黃本理校作壁復議周本鄧遼本為正孟本李申本李富華本楊本潘本中島本失校不妥黃本不據斯本而理校不妥上座神秀思惟諸人不呈心偈緣我為教授師惟斯本敦博本同孟本周本李申本李富華本楊本鄧遼本中島本均作惟潘本徑改為維黃本理校為維復議惟維此處古今可通孟本周本李申本李富華本楊本鄧遼本中島本為正黃本理校不算錯潘本徑改不妥教斯本作系涉下授字而增手旁據敦博本改復議無我若不呈心偈五祖如何得見我心中見解深淺復議無我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位即善求法斯本敦博本同孟本周本李申本楊本中島本均作即善求法李富華本徑改作求法即善潘本依興聖寺本校作求法即善鄧遼本黃本據惠昕等三本校作求法即善復議孟本周本李申本楊本中島本為正李富華本徑改且錯尤為不妥潘本鄧遼本黃本據非敦煌本改且錯不妥若不呈心終不得法心斯本敦博本同孟本周本李申本鄧遼本中島本均作心李富華本徑作心偈楊本據惠昕本補作心偈潘本黃本據鈴木校本補作心偈復議此處呈心從上下語境看即為上文之呈意偈字補與不補均不妨礙理解故以不補為好孟本周本李申本鄧遼本中島本為正李富華本徑補不妥楊本潘本黃本據非敦煌本補不妥終斯本敦博本均作修據文意改孟本據真福寺等本校作終周本中島本理校作終李申本録為修李富華本楊本徑改作終潘本據興聖寺本鄧遼本黃本據惠昕等三本校作終復議此處修乃終字筆誤因敦煌寫本字形相近所致李申本方簡注稱若將修作修持解似亦可通本段論述的關鍵是通過作偈呈心得到弘忍的印可並非論述個人修持故這裏的修不應作修持解孟本周本潘本鄧遼本中島本黃本為正李申本徑録不妥李富華本楊本徑改不妥良久思惟甚難甚難甚難甚難斯本作甚難甚難甚難甚難據敦博本改孟本潘本據斯本徑録作甚難甚難甚難甚難周本李富華本楊本鄧遼本中島本據敦博本徑録作甚難甚難李申本黃本據敦博本校作甚難甚難復議此處甚難甚難或甚難甚難甚難甚難雖均可通但後者恐是在前者基礎上誤加重文號所致故以甚難甚難為好李申本黃本為正孟本周本李富華本楊本潘本鄧遼本中島本失校不妥夜至三更不令人見遂向南廊下中間壁上題作呈心偈欲求於法間斯本作問據敦博本改孟本據敦博本校作間周本李申本李富華本楊本潘本鄧遼本黃本中島本皆失校復議孟本為正周本李申本李富華本楊本潘本鄧遼本黃本中島本皆失校不妥於敦博本作衣據斯本改孟本潘本李申本鄧遼本據敦博本校作衣周本李富華本楊本黃本中島本徑録作衣復議在敦煌本壇經中衣不但是得法的表徵更是接班人的信物神秀所以遲疑是擔心別人懷疑他覓祖故此處以斯本為正可與之不合得法呼應孟本潘本李申本鄧遼本校勘有誤不妥周本李富華本楊本黃本中島本失校且誤尤為不妥若五祖見偈言此偈語若訪覓我若斯本敦博本同諸本照録鄧遼本據惠昕等三本於若前補秀乃思惟四字復議此處不補秀乃思惟四字無礙文意理解故不應補諸本為正鄧遼本據非敦煌本補不妥語斯本敦博本同諸本作語孟本疑斯本語為悟中島本理校作誤復議從到四句是神秀猜測弘忍可能出現的兩種態度與自己的兩種對策由此孟本提出的語或為悟之誤的確可以考慮如此處為悟則從到四句文從字順意義連貫中島本校為誤錯誤孟本提出的作悟的可能值得深入思考中島本理校作誤不妥我見和尚即云是秀作見和尚即云是秀作斯本無據敦博本補孟本李申本潘本黃本據敦博本補周本李富華本楊本鄧遼本中島本據敦博本録文未出校復議孟本李申本潘本黃本為正周本李富華本楊本鄧遼本中島本失校不妥五祖見偈言不堪五祖見偈言不堪斯本無據敦博本補孟本李申本潘本黃本據敦博本補周本李富華本楊本鄧遼本中島本據敦博本録文未出校復議孟本李申本潘本黃本為正周本李富華本楊本鄧遼本中島本失校不妥又李富華本在言不堪前徑補若字楊本據惠昕本於言不堪前補若字復議此處文意可通不需補若諸本不補為正李富華本徑補尤為不妥楊本據非敦煌本補不妥自是我迷宿業障重不合得法自是我迷斯本無據敦博本補孟本李申本潘本黃本據敦博本補周本李富華本楊本鄧遼本中島本據敦博本録文未出校復議孟本李申本潘本黃本為正周本李富華本楊本鄧遼本中島本失校不妥業斯本敦博本均作葉據文意改孟本周本李富華本楊本潘本鄧遼本中島本徑改作業李申本徑録作葉黃本理校業復議業為造作意志或行為業葉字形相近寫本中易混淆黃本為正孟本周本李富華本楊本潘本鄧遼本中島本徑改不妥李申本録作葉不妥聖意難測我心自息自斯本作白據敦博本改孟本據敦博本校作自周本李申本李富華本楊本鄧遼本黃本中島本徑録作自潘本理校作自復議孟本為正周本李申本李富華本楊本鄧遼本黃本中島本失校不妥潘本不據敦博本而理校不妥三注釋楞伽變變指變相變文等指把佛經或歷史故事以圖畫雕塑說唱文學等形式表現出來楞伽即楞伽經印度大乘佛教經典共有三種漢譯本劉宋求那跋陀羅譯四卷本楞伽經北魏菩提流支譯十卷本入楞伽經唐實叉難陀譯七卷本大乘入楞伽經據傳三種漢譯本中四卷楞伽經為菩提達磨付囑慧可故特為達磨至弘忍時的禪宗所重此處楞伽變指將四卷本楞伽經的內容以繪畫的形式表現出來盧坽人名畫師生卒年月不詳生平不詳心偈偈指偈頌參見第四章注釋心偈指表達個人體悟佛法深淺的偈頌見解這裏指對佛法的理解和領悟呈意呈呈露意參見第四章注釋大意故此處呈意意為向弘忍呈上對佛法的理解聖位傳統指佛教三乘人證得菩提之果位此處指禪宗的祖位即傳承禪宗教法的祖師三更古時夜間計時單位一夜分為五更每更約兩小時三更指半夜即夜間十二點宿業障重宿過去業業力障蔽障正道此處指宿世的惡業嚴重蔽障正道四分段標點復議一分段諸録校本對第五章分段法較為歧雜分為兩段孟本中島本分兩段但第一段與上文相連成為一段且第二段與下文相連成為一段周本李申本分為兩段第一段為第二段為李富華本楊本分為兩段第一段為但第二段與下文相連成為一段不分段潘本此章與上下文相連未作獨立的一段分為三段鄧遼本分三段第一段為第二段為第三段黃本分為三段但第一段與上文相連成為一段第二段為第三段與下文相連成為一段我們認為本章敘述神秀面對五祖決定的思維過程他由開始的難於決斷到後來決定在廊下壁上作偈經過復雜的內心鬥爭應該通過分段體現內心的思維過程交待了神秀作偈的前提敘述了神秀作偈前的思想動態敘述了神秀作偈的經過及思想動態因此按照上述文理脈絡分為三段比較妥當但我們不同意鄧遼本的三段分法與下文緊密相聯不能割裂鄧遼本將兩者割裂分屬兩段使得文氣不順以至不得不在前補秀乃思惟四字其他諸録校本的分段雖然各有各的理由且基本無礙文意的理解與文氣的貫通但把一個獨立的段落與上文或下文牽扯在一起不甚妥當二分句及標點校釋疏義將本節分為句進行標點諸録校本分句標點情況各有不同大抵屬於語感的不同但也有屬於對文本的理解乃至涉及録校的問題孟本將此句分為兩句周本李申本李富華本楊本潘本鄧遼本中島本黃本作一句復議孟本分作兩句屬於可斷可不斷之例周本鄧遼本於楞伽變上加書名號不妥諸本同不復議孟本周本楊本中島本作一句李申本李富華本潘本鄧遼本黃本將本句與下文合為一句復議此處是否與合作一句亦屬兩可楊本此句之標點在思惟後漏冒號不妥孟本周本楊本中島本作一句李申本李富華本潘本鄧遼本黃本將本句與上文合為一句復議參見上句本句末尾標點有問號句號之別語氣有不同不妨礙理解這一句問題比較大先録文如下我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位五祖要求徒衆將自己對佛法的理解撰寫成偈頌若悟大意者付汝衣法稟為六代就是說五祖的決定把悟解佛法作為稟為六代的前提將兩件事緊密聯繫在一起面對五祖的這一決定神秀內心非常矛盾他矛盾什麼呢佛教從來講印可即弟子的悟道層次要由導師判定禪宗主張以心傳心則導師印可的重要性更加提高所以如果能夠得到五祖對自己悟道與否進行判定自然是一件大好事因為這是自己求法路上必須經過的一關但是五祖把此事與選擇接班人聯繫在一起這就讓神秀為難佛教主張拼棄世間的一切榮華爭當接班人正是佛教鄙視的行為神秀擔心別人會誤解他呈偈求法的舉動認為他想要爭當六祖所以遲疑起來所以這個句子以善求法不善覓祖為核心由兩個分句組成具體地敘述了神秀內心的矛盾心態孟本將此句分為兩句標點為我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位分為兩句後文理雖然可通但實際上應算破句另外把求法也歸入不善顯然是錯誤的周本將此句標點為我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位這種標點雖不破句但把求法歸入不善有誤李申本將此句標點為我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位與周本標點沒有本質差別李富華本作我將心偈上五祖呈意求法即善覓祖不善卻同凡心奪其聖位李富華本任意改動原本文字為古籍整理之大忌楊本將此句標點為我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位楊本沒有讀懂本句將覓祖上屬造成破句且將覓祖作為善不符合本章所要表達的神秀的思想潘本鄧遼本黃本依據興聖寺本等非敦煌資料將本句改為我將心偈上五祖呈意求法即善覓祖不善卻同凡心奪其聖位文意雖通但這種校勘法不值得仿效中島本將此句標點為我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位中島本所用雖為日式標點但基本表達了原句的含義只是未能體現出善不善這一分句結構另外善與求法之間沒有斷開容易引起歧義此句原文雖然直白但文從句順意義清晰諸録校本或者沒有把握這一章企圖表達的神秀的矛盾心態及其原因或者用非敦煌資料不必要地擅改敦煌本壇經標點得難以讓人滿意諸本分句同標點雖有差異無礙理解不復議諸本分句同標點雖有差異無礙理解不復議除中島本諸本分句同標點雖有差異無礙理解不復議中島本將本句及合為一句本句是神秀題偈是神秀推測弘忍可能有的反應及自己對策應分開為好孟本李申本李富華本楊本將與合為一句合為一句周本鄧遼本將這四句合為一句潘本黃本將與合為一句將與下文合為一句中島本將與上文合為一句合為一句復議這四句敘述神秀推測弘忍見到偈頌以後可能出現的兩種態度以及自己的兩種對策因此無論像校釋疏義這樣分作四句還是像孟本等分作兩句或者像周本等分為兩個分句後合為一句只要將神秀的上述思路分理清晰均可成立但是下文之是總結句應該自成一句潘本黃本將它與連接不妥這四句的標點諸本雖不盡一致大抵屬於可斷可不斷但周本潘本鄧遼本中島本黃本將五祖見偈言不堪連書為五祖見偈言不堪可能引起歧義不妥除潘本黃本諸本同參見上句不復議五疏義本章主要敘述神秀在得知弘忍以公開招標的方法選拔接班人以後的矛盾心態一方面作為一個佛教修行者最高目標自然是解脫生死覺悟成佛而作為一個禪宗教團成員是否真正達到開悟境地需要有一個以心傳心的宗教過程需要得到宗教導師的印可另一方面作為一個佛教徒應該無我無我所放棄對世間一切事物包括對名譽地位的執著與追求上述兩者本來並無矛盾但是現在弘忍把印可得法與選拔接班人兩件事合併在一起便讓教團中公認的接班人神秀為了難作為一個僧人神秀自然希望得法希望弘忍印可他心中見解淺深這就需要按照弘忍的要求呈上偈頌但是正因為他已經是大家公認的接班人便多了一層擔心如果呈上偈頌是否會給其他人留下覓祖的印象而覓祖絶非一個高僧應有的舉動此外看來他對自己多年修持已經達到什麼境界心中無數所以對弘忍是否能印可自己缺乏把握在這種情況下如果公開呈上偈頌而最終被弘忍否定對自己平時已經樹立的形象肯定是一個極大的破壞然而不呈上偈頌又不可能得法得印可神秀此時進退兩難按照壇經的描述是所謂良久思惟甚難甚難考慮再三神秀決定祕密呈偈他自己的設想是如果弘忍看了自己的偈頌說這首偈頌開悟了必定會尋找作者到那時自己便可以出面承認偈頌是自己作的這樣自然達到得法的目的如果弘忍看了偈頌說這首偈頌不行那證明自己宿業未斷尚未開悟不能得法自然自己也就不必出面那麼也就不會出現損害形象的問題但是壇經的這一段神秀心理活動的敘述是以惠能講述的口吻出現的從壇經看在整個徵求偈頌的過程中惠能與神秀並無往來既然如此神秀的這一系列心理活動惠能又從何得知呢對此壇經沒有交代這就大大降低了這段心理描述的可信性然而如果神秀當年的確做過半夜不為人知祕密題偈的事情則上述心理活動也可以通過合理的推測得出因此我們不能因為這是神秀的心理活動別人無從知曉從而否定壇經敘述的可靠性總之敦煌本壇經在此塑造了一個看來清高實際精於計算患得患失且對自己修持境界缺乏信心的神秀形象這個神秀看來只求得法不求覓祖但是無論誰讀到這一段都會想想神秀真的那麼清高真的不想覓祖還是他對自己不自信怕覓不到祖反而被弘忍否定弄巧成拙所以設計出這樣一個祕密呈偈的方案以便自己可攻可守進退自如壇經是在禪宗南宗與北宗激烈鬥爭的年代從南方傳到北方當時鬥爭的焦點之一就是誰才是禪宗的正統這就涉及弘忍到底把祖位傳給誰聯繫這一背景則壇經中出現上述內容也就可以理解了六原始資料敦博本大師堂前有三間房廊於此廊下供養欲畫楞伽變並畫五祖大師傳授於法流行後代為記畫人唐坽看糪了明日下手上座神秀思惟諸人不呈心偈緣我為教授師我若不呈心偈五祖如何得見我心中見解深淺我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位若不呈心修不得法良久思惟甚難甚難夜至三更不令人見遂向南廊下中間壁上題作呈心偈欲求衣法若五祖見偈言此偈語若訪覓我我見和尚即云是秀作五祖見偈言不堪自是我迷宿葉鄣重不合得法聖意難測我心自息斯本時大師堂前有三間房廊於此廊下供養欲畫楞伽變並畫五祖大師傳授衣法流行後代為記畫人盧玪看壁了明日下手上座神秀思惟諸人不呈心偈緣我為教授師我若不呈心偈五祖如何得見我心中見解深淺我將心偈上五祖呈意即善求法覓祖不善卻同凡心奪其聖位若不呈心修不得法良久思惟甚難甚難甚難甚難夜至三更不令人見遂向南廊下中問壁上題作呈心偈欲求於法若五祖見偈言此偈語若訪覓我我宿葉障重不合得法聖意難測我心白息旅博本緑衍紅漏粉異與斯本比時大師堂前有三間房廊於此廊下供養欲畫楞伽變並畫五祖大師傳授衣法流行後代為記畫人盧玲看壁了明日下手上座神秀思惟諸人不呈心偈緣我為教授師我若不呈心偈五祖如何得見我心中見解深淺我將心偈上五褐呈意即善求法覓祖不善卻同凡心奪其聖位若不呈心修不得法良久思惟甚難甚難甚難甚難夜至三更不令人見遂向南廊下中問壁上題作呈心偈欲求依法若五祖見偈言此偈語若訪覓我我見和尚即云是秀作五祖見偈言不堪自是我迷宿葉障重不合得法聖意難測我心自息方廣錩修改審定
