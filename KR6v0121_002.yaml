body:
  text: 敦煌本壇經校釋疏義第四章執筆者王侃研讀班集體討論經文一正文五祖忽於一日喚門人盡來門人集訖五祖曰吾向汝說世人生死事大汝等門人終日供養衹求福田不求出離生死苦海汝等自性迷福門何可救汝汝總且歸房自看有智慧者自取本性般若之智各作一偈呈吾吾看汝偈若悟大意者付汝衣法稟為六代火急作門人得處分卻來各至自房遞相謂言我等不須呈心用意作偈將呈和尚神秀上座是教授師秀上座得法後自可依止請不用作諸人息心盡不敢呈偈二校記並諸家錄校復議五祖忽於一日喚門人盡來無門人集訖訖敦博本斯本均作記據文意改孟本徑錄作訖周本楊本中島本理校作已李申本潘本黃本理校作訖李富華本徑改作已鄧遼本據閻校本校作訖復議訖記字形相近故被誤寫李申本潘本鄧遼本黃本為正孟本失校不妥周本楊本中島本理校作已不妥楊本此條校記行文不規範容易產生歧義李富華本徑改作已尤為不妥五祖曰吾向汝說世人生死事大汝斯本作與據敦博本改孟本李申本潘本鄧遼本據敦博本校作汝周本李富華本楊本黃本中島本徑錄作汝復議孟本李申本潘本鄧遼本為正周本李富華本楊本黃本中島本失校不妥汝等門人終日供養衹求福田不求出離生死苦海無汝等自性迷福門何可救汝性斯本作姓據敦博本改孟本潘本據敦博本校作性周本李申本李富華本楊本鄧遼本中島本黃本徑錄作性復議孟本潘本為正周本李申本李富華本楊本鄧遼本中島本黃本失校不妥救敦博本作求據斯本改孟本潘本徑錄作救周本李富華本楊本鄧遼本中島本徑錄作求李申本據斯本校作救黃本據斯本惠昕等三本校作救復議李申本黃本為正孟本潘本失校不妥周本李富華本楊本鄧遼本中島本失校且錯尤為不妥汝總且歸房自看有智慧者自取本性般若之智各作一偈呈吾汝敦博本斯本均作汝孟本李申本潘本黃本作汝周本中島本理校作等李富華本徑改作等楊本據惠昕本校作等鄧遼本據惠昕本西夏本校作等復議孟本李申本潘本黃本為正周本中島本理校作等不妥李富華本徑改作等且錯尤為不妥楊本鄧遼本據非敦煌材料錯改敦煌本不妥總敦博本斯本均作總孟本周本李申本李富華本楊本潘本鄧遼本中島本均作總黃本據惠昕等三本校作等復議孟本周本李申本李富華本楊本潘本鄧遼本中島本為正黃本據非敦煌材料錯改敦煌本不妥智斯本作知據敦博本改孟本周本楊本潘本鄧遼本黃本據敦博本校作智李申本李富華本中島本徑錄作智復議孟本周本楊本潘本鄧遼本黃本為正李申本李富華本中島本失校不妥慧敦博本作事斯本作惠據文意改此處慧惠相通孟本潘本徑錄作惠周本李申本楊本黃本理校作慧李富華本徑改作慧鄧遼本中島本據斯本校作惠復議周本李申本楊本鄧遼本中島本黃本為正孟本潘本失校不妥李富華本徑改尤為不妥自斯本作白據敦博本改孟本據敦博本校作自周本李申本李富華本楊本潘本鄧遼本中島本黃本徑錄作自復議孟本為正周本李申本李富華本楊本潘本鄧遼本中島本黃本失校不妥性斯本作姓據敦博本改孟本李申本潘本據敦博本校作性周本李富華本楊本鄧遼本中島本黃本徑錄作性復議孟本李申本潘本為正周本李富華本楊本鄧遼本中島本黃本失校不妥之斯本作知據敦博本改孟本李申本潘本黃本據敦博本校作之周本李富華本楊本鄧遼本中島本徑錄作之復議孟本李申本潘本黃本為正周本李富華本楊本鄧遼本中島本失校不妥智敦博本作知斯本作之據文意改此處知通智孟本李富華本徑錄作智斯本異文失校周本楊本中島本理校作智斯本異文失校李申本校作知潘本黃本理校作智並指出斯本作之鄧遼本錄作知斯本異文失校復議李申本潘本黃本可為正孟本李富華本徑改且對斯本異文失校尤為不妥周本楊本中島本鄧遼本對斯本異文失校不妥吾看汝偈若悟大意者付汝衣法稟為六代悟斯本作吾據敦博本改孟本李申本潘本據敦博本作悟周本李富華本楊本鄧遼本中島本黃本徑錄作悟復議孟本李申本潘本為正周本李富華本楊本鄧遼本黃本中島本失校不妥代敦博本斯本同孟本周本李申本李富華本楊本鄧遼本中島本黃本均作代潘本謂斯本作伐據敦博本改復議孟本周本李申本李富華本楊本鄧遼本中島本黃本為正潘本辨字有誤不妥火急作作斯本作急據敦博本改孟本潘本校作急孟本漏校記號周本李富華本楊本鄧遼本中島本黃本徑錄作作李申本校作作復議火急急火急作兩俱可通孟本李申本潘本為正周本李富華本楊本鄧遼本中島本黃本失校不妥孟本漏校記號不妥門人得處分卻來各至自房自斯本作白據敦博本校作自孟本潘本據敦博本校作自周本李申本李富華本楊本鄧遼本中島本黃本徑錄作自復議孟本潘本為正周本李申本李富華本楊本鄧遼本中島本黃本失校不妥遞相謂言我等不須呈心用意作偈將呈和尚呈敦博本斯本均同孟本周本李申本中島本錄作呈李富華本徑改作澄楊本鄧遼本黃本據惠昕本校作澄潘本據興聖寺本校作澄復議孟本周本李申本中島本為正李富華本徑改且錯尤為不妥楊本潘本鄧遼本黃本據非敦煌材料改敦煌本且錯改不妥神秀上座是教授師秀上座得法後自可依止教敦博本作故教據斯本刪孟本周本楊本鄧遼本黃本中島本校作教李申本據敦博本校作故教李富華本潘本徑錄作教復議孟本周本楊本鄧遼本黃本中島本為正李申本作故教不妥李富華本潘本失校不妥授敦博本作受據斯本改孟本