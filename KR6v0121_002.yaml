云云文從字順按照第二種錄校福門何可求之後汝字必須下屬這樣下文變成汝汝總且歸房自看云云文字彆扭窒礙不通於是錄校者依據惠昕本等後出的壇經版本改敦煌本之汝汝為汝等這種依據後出壇經版本改動敦煌本的做法顯然是不妥當的至於第三種黃本錄文就救求的取捨應該歸為第一種類型但是黃本沒有弄明白總字的含義又受了第二種錄文用惠昕本擅改敦煌本的影響自行刪去總字對古籍整理來說這種做法自然是不妥當的二呈心問題對於弘忍的要求門人的反應如何呢這樣說我等不須呈心用意作偈將呈和尚上文呈心諸錄校本中孟本周本李申本中島本均錄作呈心李富華本楊本潘本鄧遼本黃本作澄心到底哪一個更加正確呢我們認為正確的錄文應作呈心理由如下第一文本依據敦博本斯本等兩個敦煌本子均為呈心而凡作澄心者或據後代壇經改動或未出校記擅改均不可信用第二宗教修持呈心乃呈露心地之意佛教修持是一種個人的行為每個人的根基不同機緣不同付出的努力不同修持所達到的境界也不同修持者內心達到的境界與他平時的外在表現未必完全統一正因為如此五祖要求門人每人作一首偈頌呈露心地表明自己已經達到的修持境界禪宗弟子也往往通過各種呈露心地的方法以得到祖師對自己修持境界的印可而澄心則為澄清澄靜心境之意如此處錄文作澄心則似乎弘忍門人即使修持到達某種境界平時的心境仍在混沌喧雜的狀態中要通過澄心這樣的方法纔能讓自己升華到某種境地我們知道惠能禪主張佛性本清淨何處有塵埃自然不可能贊同澄心這樣的方法那麼主張時時勤拂拭莫使惹塵埃的神秀禪是否需要澄心呢神秀主張看心實際上也可以說是一種澄心但是神秀的看心或者澄心是一種漸進的修持過程是通過不斷地看心逐漸地去除原來蒙在心地上的塵垢使自己的真如佛性日益發揮效用所以說人們總結神秀禪的特點是漸由此我們可以發現神秀的看心與上述諸家錄文澄心的不同即神秀的看心雖然是緩慢前進的過程卻是一個不斷前進有進無退的過程而諸家錄文中澄心所表達的意趣卻是一個進進退退的不斷反復的過程這顯然不符合禪宗的思想三請不用作及息心問題本節稱弘忍門人認為衹有神秀纔有資格得法大家以後都可以依止神秀所以都不敢作偈原文作我等不須呈心用意作偈將呈和尚神秀上座是教授師秀上座得法後自可依止請不用作諸人息心盡不敢呈偈文中請不用作的請敦博本斯本均同孟本周本李申本中島本均錄作請但李富華本潘本楊本鄧遼本黃本或據鈴木本或徑直錄作偈那麼這裏到底應該是請還是偈呢從內容看此處請偈似乎皆可通但是第一兩個敦煌本均作請而偈字無文本依據第二從語境上分析請有拜托之意似乎在弘忍的門人中神秀的勢力相當強大現在遇到教團領袖交接這樣的大事神秀一派的人馬紛紛活動要求其他門人不要作偈即不得與神秀搶奪接班人的位置如為偈則上面的語境完全不存在那麼請偈兩字到底何者為是敦煌本壇經下文交待弘忍傳法給惠能後催促他連夜離開說若在此間有人害汝並敘述有數百人來追趕捉拿他那麼這裏應該是請而不是偈不是很清楚了嗎與此相關的是諸人息心一句此句敦博本作識心斯本作息心孟本周本李富華本楊本潘本鄧遼本黃本中島本均作息李申本校作識息心意為打消作偈的心思識心可以有兩種解釋一了解自己的心即自己了解自己修持水平不夠沒有資格得法二識上文中講請不用作人之心這裏應該是哪一種解釋呢從字面看一般容易理解成第一种解釋但是上文門人們都說沒有必要呈心用意作偈因此也就不存在識心的問題因此如果是識心衹能採用第二種解釋從整節語境看弘忍發出招標廣告後弘忍的人馬紛紛活動整個教團陷入一種不正常的氣氛我們認為這正是敦煌本壇經的作者所要營造的氛圍從這一點講這裏錄文以息心語意最為清晰明瞭這個詞表示即使有那麼幾個不安分之徒有心爭奪接班人地位但經過神秀勢力的活動也都偃旗息鼓不敢呈偈了如為識心由於該詞也可以理解為相當一部分人自己認為自己不夠資格主動放棄競爭則與整節的氛圍不諧調故這裏的錄文以息心為長通過上述異文的辨析本節提示我們思考如下幾個問題一弘忍東山法門的修持方法宋高僧傳卷十四謂天台止觀包一切經義東山法門是一切佛乘可見時人對東山法門評價之高關於東山法門的修持方法前此人們一直依據入道安心要方便法門蘄州忍和尚導凡趣聖悟解脫宗修心要論達摩禪師論等著作來研究那些著作都從正面論述東山法門敦煌本壇經雖然沒有詳盡論述東山法門但從另一個視角為我們提供了研究東山法門的思考方向應該說這是一個不容忽略的方向二弘忍教團的內部生態按照佛教傳統解釋僧意為和眾乃和合之意故又稱和合眾和合僧但我們在本節乃至敦煌本壇經以下各節所看到卻是另一番景象僧團內部為了教團領導人的地位拉幫結派勾心鬥角如何看待敦煌本壇經中的這些敘述這僅僅是敦煌本壇經文本的真實是當年惠能大梵寺說法的真實還是當年弘忍教團內部生態的歷史真實我們認為在此不應作任何倉促的結論而需要進行認真的研究在研究中我們必須考慮到敦煌本壇經的身份它屬於南宗神會系傳本這個傳本在南宗北宗的鬥爭中發揮過相當大的作用學術研究應該是有幾分資料說幾分話我們相信隨著資料的進一步收集弘忍教團內部生態南宗北宗關係的謎團一定可以逐步揭開當然對於詮釋主義者來說歷史的真相是不可復原的一切不過是後人的詮釋因此在他們的眼中歷史不過是任人裝飾的少女並譏笑一切力圖還原歷史真相的努力為還原主義的渴盼烏托邦式的歷史學理念但在我們看來依據真實可靠充分的歷史史料站在客觀的審慎的全面考慮問題的立場上通過種種去粗取精去偽存真的科學研究我們可以盡量接近甚至完全把握歷史的真相三弘忍傳法問題本節敘述弘忍以公開招標的方法選拔接班人但是在筆者所知範圍內似乎無論在弘忍之前還是在弘忍之後禪宗乃至整個佛教都沒有採用過這種選拔接班人的方法那麼弘忍為什麼要採取這種方法呢梅挺秀認為東山門下僧徒上千弘忍要培養接班人傳授衣缽應早就進行安此字疑衍方按不會臨時取決於一場交心運動作偈比賽門人的反應是正確的五祖要將衣法傳給上座神秀這從下面弘忍對神秀初偈的肯定以及啟發誘導他進步入門可以證明但想不到中間殺出個砍柴佬獦獠漢打亂了他的部署第頁梅挺秀上面這段話有點自相矛盾他一方面肯定弘忍已經決定把衣法傳給神秀一方面又批評弘忍不應搞這場作偈比賽以致冒出個惠能自亂部署梅挺秀憑什麼說弘忍已經決定把衣法傳給神秀呢應該說壇經本身並沒有提供這方面的依據梅挺秀是根據門人的反應推測的的確從敦煌本壇經的描寫看神秀在弘忍教團中的勢力很大無人可以與他抗衡既然神秀的勢力這麼大既然弘忍已經決定把衣法傳給神秀那麼弘忍公開地直接地把衣缽傳給神秀就可以了為什麼還要進行這一場招標難道是故弄玄虛由此可見梅挺秀的弘忍已經決定把衣法傳給神秀的說法恐怕不能成立一種說法認為弘忍為了表示自己大公無私所以舉行這場招標熟悉叢林傳統的都知道在大家公認某人為接班人的情況下一般不會有什麼糾紛與爭議在這種情況下如果弘忍為了表示自己的公正標新立異搞什麼招標未免有做秀之嫌作為禪宗的祖師弘忍大約不會去做秀我們認為單純地從弘忍公開招標的舉動看難以推測弘忍到底想把接班人的位置交給誰正像現代招標事先無法知道到底誰能中標但是按照敦煌本壇經的描寫當時在整個弘忍教團眾人心目中神秀已經是接班人的不二人選在這種局面下弘忍還要特意搞一場作偈比賽那麼衹能說明一點弘忍沒有看上神秀心目中另有人選而這一點正是敦煌本壇經中出現弘忍招標這一情節的原因敦煌本壇經沒有公開把這個原因講出來粗心的讀者也許不能領會但敦煌本壇經中有一個人物領會了這一點那就是神秀敦煌本壇經下文描寫神秀得知弘忍招標一時陷入進退失據的矛盾心態顯然原本他以為自己已經坐穩接班人的位置沒有想到弘忍突出奇招這纔知道弘忍的真實想法一時亂了方寸弘忍心目中的人選是誰敦煌本壇經沒有講但是在神會的南陽和尚問答雜徵義中講了這麼一段故事弘忍主動到碓房找到惠能又在夜間將惠能秘密喚入自己房內談了三天三夜確認惠能的確証如來知見便付囑衣法並讓惠能連夜離開以免遭害這段故事沒有提到作偈比賽但弘忍內堂傳法並讓惠能連夜離開黃梅則與敦煌本壇經一致敦煌本壇經是神會系的傳本南陽和尚問答雜徵義是神會本人的著作為什麼在南陽和尚問答雜徵義中沒有作偈比賽這一重要情節呢是否存在這樣的可能即惠能初上黃梅便語出驚人引起弘忍的注意其後弘忍多次與他交接得知惠能佛學水平堪能受法但當時神秀名滿教團為了惠能得法具有正統性便來了公開招標這一招但這一招有點師徒串通的意味所以南陽和尚問答雜徵義中不提作偈比賽而敦煌本壇經為了避嫌起見把密室傳法安排在作偈比賽之後當然上述說法純屬大膽的假設其中存在著不合理的成分如果這個假設可以成立弘忍當場肯定惠能偈頌並公開授以衣缽即可為什麼還要假惺惺地說什麼此亦未得了呢如果說這是為了保護惠能不受神秀勢力的迫害那麼弘忍將衣法私下傳給惠能即可又何必公開招標呢所以也有研究者提出歷史上也許根本不存在作偈比賽私傳袈裟這樣的事實這一切都是後人編造的我們也可以撇開一切玄虛與猜疑做一個最最平實的推論弘忍年事已高需要選拔一個接班人這個接班人自然應該是解悟了佛法的精英所以他提出作偈比賽想由此考查哪個人真正解悟了佛法好把教團的領導權交給他總之弘忍傳法惠能得法的故事充滿了戲劇性也充滿了懸念充滿了迷霧歷史的真相到底如何還需要我們將來進一步的研究與發掘六原始資料敦博本五祖忽於一日喚門人盡來門人集記五祖曰吾向汝說世人生死事大汝等門人終日供養衹求福田不求出離生死苦海汝等自性迷福門何可求汝汝總且歸房自看有智事者自取本性般若之知各作一偈呈吾吾看汝偈若悟大意者付汝衣法稟為六代火急作門人得處分卻來各至自房遞相謂言我等不須呈心用意作偈將呈和尚神秀上座是故教受師秀上座得法後自可依止請不用作諸人識心盡不敢呈偈斯本五祖忽於一日喚門人盡來門人集記五祖曰吾向與說世人生死事大汝等門人終日供養衹求福田不求出離生死苦海汝等自姓迷福門何可救汝汝總且歸房自看有知惠者白取本姓般若知之各作一偈呈吾吾看汝偈若吾大意者付汝衣法稟為六代火急急門人得處分卻來各至白房遞相謂言我等不須呈心用意作偈將呈和尚神秀上座是教授師秀上座得法後自可於止請不用作諸人息心盡不敢呈偈旅博本綠衍紅漏粉異與斯本比五祖忽於一日喚門人盡來門人集記五祖曰吾向汝說世人生死事大汝等門人終日供養只求福田不求出離生死苦海汝等自姓迷福門何可救汝汝總且歸房自看有知惠者自取本姓般若之知各作一偈呈吾吾看汝偈若悟大意者付汝衣法稟為六代火急急門人得處分卻來各至自房遞相謂言我等不須呈心用意作偈將呈和尚神秀上座是教授師秀上座得法後自可依止請不用作諸人息心盡不敢呈偈方廣錩修改審定
