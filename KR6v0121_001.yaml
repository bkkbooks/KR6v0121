body:
  text: 敦煌本壇經校釋疏義第三章執筆者張磊研讀班集體討論經文一正文弘忍和尚問惠能曰汝何方人來此山禮拜吾汝今向吾邊復求何物惠能答曰弟子是嶺南人新州百姓今故遠來禮拜和尚不求餘物唯求佛法作大師遂責惠能曰汝是嶺南人又是獦獠若未堪作佛法惠能答曰人即有南北佛性即無南北獦獠身與和尚不同佛性有何差別大師欲更共議見左右在傍邊大師更便不言遂發遣惠能令隨衆作務時有一行者遂差惠能於碓坊踏碓八個餘月二校記並諸家録校復議弘忍和尚問惠能曰汝何方人來此山禮拜吾無汝今向吾邊復求何物邊斯本敦博本同孟本周本李申本李富華本楊本鄧遼本中島本黃本均作邊潘本敦煌壇經校記亦同但敦煌壇經新書奪邊字復議孟本周本李申本李富華本楊本鄧遼本中島本黃本為正潘本奪邊字不妥惠能答曰弟子是嶺南人新州百姓今故遠來禮拜和尚嶺斯本作領據敦博本改孟本潘本據敦博本校作嶺認為敦煌俗寫嶺作領周本李申本李富華本楊本鄧遼本中島本黃本徑録作嶺復議據辭海領通嶺漢書嚴助傳輿轎爾隃逾領但漢語大字典舉元周伯琦六書正偽梗韻稱領山之高者曰領取其象形也別作嶺孟本潘本為正周本李申本李富華本楊本鄧遼本中島本黃本失校不妥新敦博本斯本同孟本周本李申本李富華本楊本潘本鄧遼本中島本均作新黃本出校謂斯本作蘄復議孟本周本李申本李富華本楊本潘本鄧遼本中島本為正黃本辨字有誤不妥不求餘物唯求佛法作唯求佛法作敦博本斯本同孟本據石井修道本校改作唯求作佛法周本理校作唯求作佛李申本照録作唯求佛法作李富華本徑改作唯求作佛法楊本中島本理校作唯求作佛法潘本據興聖寺本校改作唯求作佛鄧遼本據敦煌本神會語録惠昕本校改作唯求作佛黃本據惠昕本興聖復議者按黃本照抄潘本誤聖作善下同不注寺本與神會語録校改作唯求作佛復議此句敦博本斯本文字一致且作就是實行的意思實行佛法學習佛法的目的正是為了成佛此為當時口語且語義可通故可不改李申本為正孟本潘本鄧遼本黃本依據非敦煌系資料神會語録除外作校改不妥周本楊本中島本此處之理校不妥李富華本徑改尤為不妥大師遂責惠能曰汝是嶺南人又是獦獠若未堪作佛法嶺斯本作領據敦博本改孟本潘本據敦博本校作嶺周本李申本李富華本楊本鄧遼本中島本黃本徑録作嶺復議孟本潘本為正周本李申本李富華本楊本鄧遼本中島本黃本失校不妥獦獠敦博本斯本同孟本徑改作猲獠周本李申本李富華本楊本潘本鄧遼本中島本均作獦獠黃本謂依據潘重規的考證校改為獵獠復議周本李申本李富華本楊本潘本鄧遼本中島本為正孟本徑改且誤尤為不妥黃本校改有誤不妥若未堪作佛法斯本作若為堪作佛敦博本原文作若為堪作佛法但為旁有兩點表示刪除又加注未表示改為未故據敦博本校改作若未堪作佛法孟本李富華本潘本中島本徑録作若為堪作佛周本楊本鄧遼本黃本據斯本校改作若為堪作佛李申本據敦博本録作若未為堪作佛法出校説明斯本沒有未法兩字復議孟本李富華本潘本中島本失校且録文有誤尤為不妥周本據斯本校改而誤不妥李申本辨字有誤不妥楊本鄧遼本辨字有誤且據斯本校改而誤尤為不妥黃本據斯本惠昕本校改而誤不妥又楊本附編二壇經敦博本的學術價值探討引用這段文字時作若未為堪作佛法參見楊本第頁楊本録文同書論文中引文自相矛盾不妥惠能答曰人即有南北佛性即無南北性斯本作姓據敦博本改孟本潘本據敦博本校作性周本李申本李富華本楊本鄧遼本中島本黃本徑録作性復議孟本潘本為正周本李申本李富華本楊本鄧遼本中島本黃本失校不妥獦獠身與和尚不同佛性有何差別性敦博本斯本皆作姓據文意改孟本潘本謂據敦博本改作性周本楊本中島本黃本理校作性李申本李富華本徑録作性鄧遼本據惠昕本校改作性復議周本楊本鄧遼本中島本黃本為正孟本潘本辨字有誤不妥李申本李富華徑改不妥大師欲更共議見左右在傍邊大師更便不言議敦博本斯本同孟本周本李申本李富華本楊本潘本中島本照録作議鄧遼本據惠昕等三本改作語黃本據鄧榮本及惠昕等三本改作語復議孟本周本李申本李富華本楊本潘本中島本為正鄧遼本黃本據惠昕等三本校改敦煌本且錯不妥便斯本無據敦博本補更便不言孟本潘本作更不言不出校周本參斯本校作便不言李申本李富華本楊本中島本作更便不言不出校鄧遼本黃本理校作便不言復議敦博本語意雖似重疊但可通以保留原貌為佳作便不言更不言亦可通周本為正孟本李申本李富華本楊本潘本鄧遼本中島本黃本失校不妥遂發遣惠能令隨衆作務無時有一行者遂差惠能於碓坊差敦博本作著據斯本改孟本楊本潘本鄧遼本黃本據斯本校作差周本李申本據敦博本校作著李富華本徑作差中島本徑作著復議差著此處可通孟本周本李申本楊本潘本鄧遼本黃本為正李富華本中島本失校不妥踏碓八個餘月無三注釋獦獠傳統有多種解釋黃本歸納為四種丁福保認為是對以攜犬行獵為生的南方少數民族的侮稱潘重規認為獦是獵的俗寫獠是蠻夷之人居山傍水多以漁獵為生蒙默認為獵獠當為仡佬的異寫不當讀為獵獠獦只是借其音獦而已張新民綜合了潘蒙之説認為獦獠仍當讀作獵獠殆指獵頭獠人而非打獵獠人黃本第頁梅挺秀最近主張此詞至今仍存粵語指講話的不同口音北方人説南方人為獦獠廣東人也説其他語系的人獦獠常用來指不太好懂的語言按唐李德裕會昌一品集卷十二載京城傳説南蠻在西蜀驅掠五萬餘人音樂伎巧無不蕩盡但經他調查蠻兵共掠九千人除了少數人外並是尋常百姓並非工巧其八千九百餘人皆是黎雅州百姓半雜獦獠再五代后蜀何光遠鑒戒録卷六産麒麟條載某女崔氏夢一人自稱山神牽一五色獸逼其裙下既驚且窹因而有孕焉故該孩子的小名叫獦獠兒後來一個和尚見到此子曰怪來近日貧道所居之山氣色稍微其山之神孕夷於此此子麒麟之精也又宋米芾寄薛紹彭詩云懷素獦獠小解事懷素書法家長沙湖南人情性疏放不拘細行最嗜飲酒從上述唐五代北宋資料看獦獠並非形容人的難懂口音而是對文化程度不高不太開化的人的一種貶稱也用於北人對南人的貶稱佛性亦稱覺性自性本性真如實相等隨義立名假名很多此處指衆生內在本具的成佛可能性佛教各宗派對佛性的理論略有差異禪宗認為一切衆生均有佛性作務寺院內的勞作勞動行者一般泛指修行佛道者此處指禪宗寺院中未出家而住於寺內從事雜務者一般不剃髮亦有攜家帶眷者但需持五戒碓坊碓利用杠杆原理做成的舂穀的設備安置碓的房子稱為碓坊人力舂穀名為踏碓用水作動力則為水碓四分段標點復議一分段諸本對第三章共有二種分段法孟本潘本中島本只分作一段周本李申本李富華本楊本鄧遼本黃本均按照對話與結尾分作五段此段敘述的是弘忍與惠能初次見面的情況由二者的兩番對話和一個結尾構成孟本潘本中島本只分一段未能顯示不同的意群故同意按照對話及結尾分為五段二分句及標點諸家分句均無破句等重大問題故雖有差異均屬語感問題但具體分析亦有處理細膩與粗疏之分這四句是弘忍與惠能初見面時的第一通對話周本李申本將弘忍問話處理為兩句將惠能的回答相應處理為兩句兩個問句與兩個答句一一對應絲絲相扣顯得處理細膩邏輯清晰李富華本楊本雖然把弘忍問話也處理為兩句卻把惠能的回答兩句一逗到底合併成一句這樣分句雖無不可但顯得粗疏潘本把上述問答分句如下弘忍和尚問惠能曰汝何方人來此山禮拜吾汝今向吾復求何物惠能答曰弟子是嶺南人新州百姓今故遠來禮拜和尚不求餘物唯求作佛這一分句法與周本李申本基本相同區別在於弘忍問話中的第一問周本等作汝何方人來此山禮拜吾潘本作汝何方人來此山禮拜吾同一句中問號的位置不同我們認為這裏純屬語感問題沒有上下高低之分鄧遼本對此分句如下弘忍和尚問惠能曰汝何方人來此山禮拜吾汝今向吾邊復求何物惠能答曰弟子是嶺南人新州百姓今故遠來禮拜和尚不求餘物唯求作佛鄧遼本也把弘忍問話處理為兩句惠能答話處理為兩句但仔細琢磨答話從上下文看今故遠來禮拜和尚應屬上句卻被歸為下句考慮欠周黃本分句如下弘忍和尚問惠能曰汝何方人來此山禮拜吾汝今向吾邊復求何物惠能答曰弟子是嶺南人新州百姓今故遠來禮拜和尚不求餘物唯求作佛黃本雖把弘忍問話也處理為兩句但將其中來此山禮拜吾屬下句語感上差一點把惠能回答處理為一句邏輯上不夠清晰周本李富華本楊本潘本鄧遼本黃本均將上兩句合為一句中間用分號區隔只有李申本亦為一句但中間用逗號我們認為這兩句意義雖然相近但句式不同前者為陳述後者為略帶詰問的強調在此用分號合併為一句也可以但用逗號不能體現出兩句的關係可斟酌按照上文語境弘忍覺得來人不凡但因旁邊有人不方便深談就讓惠能先隨衆勞動這兩句是説正好這時有一個行者在旁行者便派惠能到碓坊踏碓結果惠能在碓坊踏了八個月碓看來該行者是寺院雜役的負責人基於上述解讀校釋疏義將這兩句分句標點為時有一行者遂差惠能於碓坊踏碓八個餘月在這裏時有一行者屬於補述介紹情況遂差惠能於碓坊為無主句主語承接時有一行者而來故應為行者踏碓八個餘月也是無主句主語應為惠能孟本合作一句作時有一行者遂差惠能於碓坊踏碓八個餘月孟本所用雖為日語標點大體上把三個語群分析清楚但沒有用句號區隔兩個句子是其不足周本作時有一行者遂著慧能於碓坊踏碓八個餘月中島本同周本中島本的分句標點表達的意思與前相同但語氣過於急促似加逗號略微停頓為好李申本李富華本楊本潘本鄧遼本黃本作時有一行者遂著惠能於碓坊踏碓八個餘月按照李申等本則行者派遣惠能到碓坊同時規定踏碓時限為八個餘月這顯然與理不合五疏義本段描述惠能與弘忍初次見面的情況關鍵是兩段對話第一段對話弘忍問惠能前來黃梅的目的惠能回答不求餘物唯求佛法作意為沒有別的目的只想來學習佛法由此引出第二段對話弘忍説你不但是嶺南人而且是嶺南人中的獦獠若未堪作佛法也就是説你沒有資格學習佛法這裏我們要問為什麼獦獠就沒有資格學習佛法呢這裏可以有兩種解釋第一種解釋從人的能力的角度講那就是學習佛法是要具備一定的能力與條件比如要有文化才能看懂佛經等等在弘忍眼中惠能既然是一個還不太開化的人自然缺少學習高深佛法的基礎所以説他沒有資格學習佛法我們認為這一解釋比較順理成章所以校釋疏義採用這一解釋另一種解釋從人的本質的角度講那就是弘忍認為惠能根本成不了佛所以拒絶他前此的録校者很多人都採取後一種解釋甚至不惜為此篡改壇經原文如周本潘本鄧遼本黃本等四個録校本都把惠能的唯求佛法作改為唯求作佛而孟本周本李富華本楊本潘本鄧遼本中島本黃本八個録校本又都把弘忍答語中的若未堪作佛法改為若為堪作佛這樣敦煌本壇經原文中惠能要求學習佛法弘忍認為他沒有能力學習佛法的問答變成惠能要求成佛弘忍判定他是獦獠不能成佛於是兩人交接的場景完全變了惠能一登場就非常自傲地提出我來就是為了成佛而弘忍則毫不客氣地當頭一棒你這個獦獠還想成佛沒門我們知道自從南北朝竺道生主張一闡提人也能成佛以來一切衆生均有佛性均存在成佛的可能性的理論已經成為中國佛教的主流作為一代宗師的弘忍怎麼可能違背中國佛教的這一基本理論呢所以後一種解釋是站不住腳的為了表述后一種解釋任意改竄敦煌本壇經的文字這種做法更是文獻學所不能允許的如前所分析弘忍的回答重點是説惠能缺乏學習佛法的能力與條件惠能對此的答復是惠能答曰人即有南北佛性即無南北獦獠身與和尚不同佛性有何差別惠能在這裏避開人的能力水平等問題直截了當從人的本性入手人人都有佛性而佛性是沒有差別的我的能力雖然比不上你我的佛性與你又有什麼差別呢惠能的回答分為兩句前一句是大前提有了這個大前提結論自然是惠能的佛性與弘忍的佛性沒有區別因此無論惠能的水平怎樣低條件怎樣差他都有學習佛法的資格從敦煌本壇經看惠能的回答顯然出於弘忍的意外弘忍認識到面前的這個獦獠非同一般於是把他留下來雖然上述場景乃多年後惠能在大梵寺的追述但我們依然可以看出在到黃梅之前惠能已經具備了一切衆生皆有佛性這種基本的佛學知識那麼他的這些知識是從哪裏來的呢從敦煌本壇經看似乎除了在官店中聽人念誦金剛經外惠能並無其他接受佛教知識的來源但金剛經為大乘般若派經典主旨講破相沒有正面論述佛性理論因此惠能的佛性論知識應該另有來源根據曹溪大師別傳惠能赴黃梅前曾在曹溪居住夜聽無盡藏尼讀涅槃經隨即能講而涅槃經的主旨正是一切衆生皆有佛性由此我們或許可以得出如下結論第一早在遠赴黃梅之前惠能已經建立起堅定的佛性論思想應該説這一思想貫穿惠能的一生是惠能禪法思想的理論基礎也是壇經的理論基礎第二曹溪大師別傳産生年代較早其中保存了一些值得重視的資料從這段文字我們還可以思考如下問題第一弘忍東山法門的特徵到底是什麼第二禪宗標榜不立文字那麼禪宗是從什麼時候開始作出這一標榜的呢第三為什麼宋贊寧高僧傳公然記載忍曰嶺南人無佛性禪宗在這裏經歷了什麼樣的理論變遷六原始資料敦博本弘忍和尚問惠能曰汝何方人來此山禮拜吾汝今向吾邊復求何物惠能答曰弟子是嶺南人新州百姓今故遠來禮拜和尚不求餘物唯求佛法作大師遂責惠能曰汝是嶺南人又是獦獠若未堪作佛法惠能答曰人即有南北佛性即無南北獦獠身與和尚不同佛姓有何差別大師欲更共議見左右在傍邊大師更便不言遂發遣惠能令隨衆作務時有一行者遂著惠能於碓坊踏碓八個餘月斯本弘忍和尚問惠能曰汝何方人來此山禮拜吾汝今向吾邊復求何物惠能答曰弟子是領南人新州百姓今故遠來禮拜和尚不求餘物唯求佛法作大師遂責惠能曰汝是領南人又是獦獠若為堪作佛惠能答曰人即有南北佛姓即無南北獦獠身與和尚不同佛姓有何差別大師欲更共議見左右在傍邊大師更不言遂發遣惠能令隨衆作務時有一行者遂差惠能於碓坊踏碓八個餘月旅博本緑衍紅漏粉異與斯本比弘忍和尚問能惠曰汝何方人來此山禮拜吾汝今向吾邊復求何物惠能答曰弟子是嶺南人新州女百姓今故遠來禮拜和尚不求餘物唯求佛法作大師遂責惠能曰汝是嶺南人又是獦獠若為堪作佛惠能答曰人即有南北佛姓即無南北獦獠身與和尚不同佛姓有何差別大師欲更共議見左右在傍邊大師更便不言遂發遣惠能令隨衆作務時有一行者遂差惠能於碓坊踏碓八個餘月方廣錩修改審定
